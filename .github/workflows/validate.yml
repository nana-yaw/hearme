# Validation only — no bundling or signing. Releases are built locally on
# purpose: the app is ad-hoc signed and installing invalidates TCC grants,
# which is a human step regardless (see docs/ARCHITECTURE.md).
#
# Cost note: this repo is private on the GitHub free tier, where macOS
# runners bill at 10x. The always-on jobs therefore run on Ubuntu (frontend
# gates + the Linux compile path of the Rust tree, which covers all shared
# logic incl. the fork's unit tests). The mac-specific compile (Swift
# Apple Intelligence bridge, Metal path) is a manual workflow_dispatch job.
name: validate

permissions:
  contents: read

on:
  push:
    branches: [private-fork]
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run check:translations
      - run: bunx prettier --check .
      - run: bun run build

  rust:
    runs-on: ubuntu-latest
    # Runs on every push — the Rust tree is where the risk lives.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Linux build deps (per BUILD.md)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libasound2-dev pkg-config libssl-dev \
            libvulkan-dev vulkan-tools glslc spirv-headers glslang-tools libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libgtk-layer-shell0 libgtk-layer-shell-dev patchelf cmake
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - name: Format check
        run: cargo fmt --check
        working-directory: src-tauri
      - name: Unit tests (lib)
        run: cargo test --lib
        working-directory: src-tauri
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true # informational — surfaces advisories without blocking
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07
      - run: cargo install cargo-audit --locked || true
      - run: cargo audit || true
        working-directory: src-tauri
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - run: bun audit || true

  # The mac-specific surface (Swift bridge, Metal) — trigger manually before
  # releases: gh workflow run validate.yml (job runs only on dispatch).
  macos-compile:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - name: Type-check the macOS tree
        run: cargo check --lib
        working-directory: src-tauri
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
